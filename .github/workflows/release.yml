name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          mkdir -p build dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            package_name="piece_${version}_${goos}_${goarch}"
            package_dir="build/${package_name}"

            mkdir -p "${package_dir}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${version}" \
              -o "${package_dir}/piece" \
              .

            tar -C build -czf "dist/${package_name}.tar.gz" "${package_name}"
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - name: Skip when tap token is not configured
        if: env.HOMEBREW_TAP_GITHUB_TOKEN == ''
        run: |
          echo "::notice::HOMEBREW_TAP_GITHUB_TOKEN is not configured; skipping tap PR creation."

      - name: Check out piece-cli
        if: env.HOMEBREW_TAP_GITHUB_TOKEN != ''
        uses: actions/checkout@v4

      - name: Check out homebrew tap
        if: env.HOMEBREW_TAP_GITHUB_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: shonenada/homebrew-tap
          token: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        if: env.HOMEBREW_TAP_GITHUB_TOKEN != ''
        shell: bash
        run: |
          scripts/generate-formula.sh "${GITHUB_REF_NAME}" > homebrew-tap/Formula/piece.rb

      - name: Create pull request
        if: env.HOMEBREW_TAP_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap
          add-paths: Formula/piece.rb
          base: main
          branch: automation/update-piece-${{ github.ref_name }}
          delete-branch: true
          commit-message: Update piece formula to ${{ github.ref_name }}
          title: Update piece formula to ${{ github.ref_name }}
          body: |
            Update `Formula/piece.rb` to `${{ github.ref_name }}`.

            This change was generated by the release workflow in `shonenada-vibe/piece-cli`.
